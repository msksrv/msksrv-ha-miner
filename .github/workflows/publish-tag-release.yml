# Opens a GitHub Release when you push a version tag (e.g. v1.4.0b2).
# Betas are marked Pre-release; stable tags (v1.4.0) are full releases.
# The "Release" workflow then attaches miner.zip and patches manifest version.

name: Create release from tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Classify pre-release (beta / rc / alpha)
        id: classify
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PRERELEASE=false
          if [[ "$VERSION" =~ b[0-9]+ ]] \
            || [[ "$VERSION" =~ a[0-9]+ ]] \
            || [[ "$VERSION" == *"-rc"* ]] \
            || [[ "$VERSION" == *"rc."* ]] \
            || [[ "$VERSION" == *"beta"* ]]; then
            PRERELEASE=true
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.classify.outputs.prerelease == 'true' }}
          generate_release_notes: true
