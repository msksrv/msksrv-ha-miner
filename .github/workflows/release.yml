name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6"

      - name: "Adjust version number"
        shell: "bash"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          # HA manifest expects semver without leading "v" (e.g. 1.4.0, not v1.4.0)
          VERSION="${TAG_NAME#v}"
          yq -i -o json ".version=\"${VERSION}\"" \
            "${{ github.workspace }}/custom_components/miner/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/miner"
          zip miner.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ github.workspace }}/custom_components/miner/miner.zip
